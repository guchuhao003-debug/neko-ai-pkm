spring:
  application:
    name: neko-agent
  profiles:
    active: local

server:
  port: 8123
  servlet:
    context-path: /api

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    # MyBatis 配置
    #true: 将下划线转变成驼峰式
    map-underscore-to-camel-case: false
    #仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  #配置全局配置
  global-config:
    db-config:
      #逻辑删除配置
      logic-delete-field: isDelete  #全局逻辑删除的实体字段名
      logic-delete-value: 1 #逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 #逻辑未删除值（默认为 0）
    enable-sql-runner: true

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.wenxi.nekoaipkm.controller

# knife4j的增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    #org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug
    org.springframework.ai: debug